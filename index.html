<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INARCH — Dashboard Comercial</title>
<style>
:root { color-scheme: light; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #F7F6F2; color: #1a1a18; font-size: 14px; }
header { background: #fff; border-bottom: 1px solid #e8e6df; padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; }
.header-title { font-size: 16px; font-weight: 600; }
.header-sub { font-size: 12px; color: #999; margin-top: 2px; }
.refresh-btn { font-size: 12px; padding: 6px 14px; border: 1px solid #d1cec5; border-radius: 6px; background: #fff; cursor: pointer; color: #444; }
.refresh-btn:hover { background: #f5f4f0; }
main { padding: 20px 24px; max-width: 1200px; margin: 0 auto; }

.kpi-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 28px; }
.kpi-box { background: #fff; border: 1px solid #e8e6df; border-radius: 10px; padding: 14px 16px; }
.kpi-label { font-size: 11px; color: #999; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.kpi-value { font-size: 24px; font-weight: 600; letter-spacing: -0.5px; line-height: 1; }
.kpi-sub { font-size: 12px; color: #999; margin-top: 4px; }

.dash-section { margin-bottom: 28px; }
.section-title { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.09em; padding-bottom: 9px; margin-bottom: 14px; border-bottom: 2px solid #e8e6df; }

.cards-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.pcard { background: #fff; border: 1px solid #e8e6df; border-radius: 10px; padding: 14px 16px; }
.pcard-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2px; }
.pcard-name { font-size: 15px; font-weight: 600; }
.pcard-badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
.badge-green { background: #EAF3DE; color: #3B6D11; }
.badge-amber { background: #FEF3D7; color: #854F0B; }
.badge-red   { background: #FCE8E8; color: #A32D2D; }
.pcard-addr { font-size: 12px; color: #999; margin-bottom: 10px; }
.pbar-track { height: 5px; background: #F0EEE8; border-radius: 3px; margin-bottom: 10px; overflow: hidden; }
.pbar-fill  { height: 100%; border-radius: 3px; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px 10px; }
.stat-row { display: flex; justify-content: space-between; font-size: 12px; padding: 2px 0; }
.stat-label { color: #aaa; }
.stat-value { font-weight: 500; }
.stat-divider { grid-column: 1 / -1; border-top: 1px solid #f0eee8; margin: 5px 0; }

.econ-wrap { background: #fff; border: 1px solid #e8e6df; border-radius: 10px; overflow: hidden; }
.econ-table { width: 100%; border-collapse: collapse; }
.econ-table th { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.05em; padding: 10px 16px; text-align: left; background: #faf9f6; border-bottom: 1px solid #e8e6df; }
.econ-table th:not(:first-child) { text-align: right; }
.econ-table td { font-size: 13px; padding: 10px 16px; border-bottom: 1px solid #f5f4f0; }
.econ-table td:not(:first-child) { text-align: right; }
.econ-table tr:last-child td { border-bottom: none; }
.econ-table tr:hover td { background: #faf9f6; }
.econ-table tfoot td { font-weight: 600; background: #faf9f6; border-top: 2px solid #e8e6df !important; border-bottom: none !important; }
.econ-name { font-weight: 600; font-size: 13px; }
.econ-barrio { font-size: 11px; color: #aaa; }
.econ-green { color: #3B6D11; font-weight: 600; }
.econ-blue  { color: #185FA5; font-weight: 600; }
.econ-nd    { color: #bbb; }

.tipo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.tipo-card { background: #fff; border: 1px solid #e8e6df; border-radius: 10px; padding: 14px 16px; }
.tipo-card-title { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
.tipo-card-sub { font-size: 11px; color: #aaa; margin-bottom: 12px; }
.tipo-table { width: 100%; border-collapse: collapse; }
.tipo-table thead th { font-size: 11px; color: #aaa; padding: 0 0 6px; font-weight: 500; border-bottom: 1px solid #f0eee8; }
.tipo-table thead th:not(:first-child) { text-align: right; }
.tipo-table tbody td { font-size: 12px; padding: 5px 0; border-bottom: 1px solid #f8f7f4; }
.tipo-table tbody td:not(:first-child) { text-align: right; }
.tipo-table tbody tr:last-child td { border-bottom: none; }
.t-name { font-weight: 500; }
.t-vend  { color: #3B6D11; font-weight: 600; }
.t-disp  { color: #378ADD; font-weight: 600; }
.t-total { color: #666; }
.precio-range { margin-top: 12px; padding-top: 10px; border-top: 1px solid #f0eee8; display: flex; justify-content: space-between; align-items: center; }
.precio-label { font-size: 11px; color: #aaa; }
.precio-value { font-size: 12px; font-weight: 600; color: #444; }

.charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.chart-box { background: #fff; border: 1px solid #e8e6df; border-radius: 10px; padding: 16px; }
.chart-title { font-size: 12px; font-weight: 600; color: #666; margin-bottom: 12px; }
.chart-wrap { position: relative; height: 200px; }
.chart-wrap-wide { position: relative; height: 220px; }

/* ── Objectives section ── */
.obj-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.obj-card { background:#fff; border:1px solid #e8e6df; border-radius:10px; padding:14px 16px; border-left:3px solid #e8e6df; }
.obj-card.obj-green { border-left-color:#639922; }
.obj-card.obj-amber { border-left-color:#EF9F27; }
.obj-card.obj-red   { border-left-color:#E24B4A; }
.obj-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; gap:8px; }
.obj-name { font-size:15px; font-weight:600; }
.obj-addr { font-size:11px; color:#aaa; margin-top:2px; }
.obj-delivery { font-size:11px; color:#aaa; margin-top:4px; }
.obj-badge { font-size:11px; font-weight:600; padding:3px 8px; border-radius:20px; display:inline-block; }
.obj-badge-green { background:#EAF3DE; color:#3B6D11; }
.obj-badge-amber { background:#FEF3D7; color:#854F0B; }
.obj-badge-red   { background:#FCE8E8; color:#A32D2D; }
.obj-progress-wrap { margin-bottom:12px; }
.obj-progress-label { display:flex; justify-content:space-between; font-size:11px; color:#888; margin-bottom:4px; }
.obj-milestone { background:#faf9f6; border:1px solid #ede9e0; border-radius:8px; padding:10px 12px; margin-bottom:12px; }
.obj-milestone-done    { background:#f0f7e6; border-color:#c5dfa0; }
.obj-milestone-pending { background:#fef8ee; border-color:#f5d98a; }
.obj-milestone-head { display:flex; justify-content:space-between; font-size:12px; font-weight:600; color:#555; margin-bottom:8px; }
.obj-milestone-status { font-weight:600; }
.obj-milestone-done  .obj-milestone-status { color:#3B6D11; }
.obj-milestone-pending .obj-milestone-status { color:#854F0B; }
.obj-subbar-track { height:5px; background:#f0eee8; border-radius:3px; margin-bottom:6px; overflow:hidden; position:relative; }
.obj-subbar-fill  { height:100%; border-radius:3px; }
.obj-subbar-mid   { position:absolute; top:0; left:50%; width:1px; height:100%; background:#ccc; }
.obj-milestone-rates { display:flex; gap:12px; font-size:11px; color:#666; flex-wrap:wrap; }
.obj-note { font-size:11px; line-height:1.45; border-radius:5px; padding:5px 8px; }
.obj-note-warn { background:#fef3d7; color:#854F0B; }
.obj-note-ok   { background:#eaf3de; color:#3B6D11; }
.obj-targets { border-top:1px solid #f0eee8; padding-top:10px; }
.obj-target-main { margin-bottom:8px; }
.obj-target-label { font-size:11px; color:#999; margin-bottom:2px; }
.obj-target-value { font-size:20px; font-weight:700; letter-spacing:-0.5px; }
.obj-stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:4px; }
.obj-stat-label { font-size:10px; color:#bbb; text-transform:uppercase; letter-spacing:0.04em; }
.obj-stat-val   { font-size:12px; font-weight:600; color:#444; }

.notes-box { margin-bottom: 20px; }
.note-item { padding: 9px 12px; border-radius: 7px; font-size: 13px; margin-bottom: 8px; line-height: 1.5; }
.note-item:last-child { margin-bottom: 0; }
.note-warn { background: #FAEEDA; color: #854F0B; }
.note-info { background: #E6F1FB; color: #185FA5; }

.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 360px; color: #aaa; gap: 14px; }
.spinner { width: 30px; height: 30px; border: 2px solid #e8e6df; border-top-color: #639922; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.ts { font-size: 12px; color: #bbb; }
.static-badge { font-size: 11px; color: #aaa; background: #f5f4f0; border: 1px solid #e8e6df; border-radius: 5px; padding: 3px 8px; }
</style>
</head>
<body>

<header>
  <div>
    <div class="header-title">INARCH · Dashboard Comercial</div>
    <div class="header-sub">Portafolio residencial CABA — Núñez · Palermo · Monserrat</div>
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <span class="static-badge">Datos al: 18/05/2026</span>
  </div>
</header>

<main>
  <div id="content">
    <div class="loading"><div class="spinner"></div><span>Cargando...</span></div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" crossorigin="anonymous"></script>
<script>

// ── Static project data — parsed from Google Sheets on 18/05/2026 ─────────
// SANTA FE: incluye 18 unidades "Aporte terreno" contabilizadas como vendidas
const STATIC_DATA = [
  {
    name: 'NODO',
    vendidas: 47, disponibles: 23, total: 70,
    pct: 61,
    m2Vendidos: 2239, m2Disponibles: 1447,
    stock: 5146149, soldValue: 6491343,
    cocherasVendidas: 16, cocherasDisponibles: 16,

      { tipo: 'Monoambiente',  vendidas: 25, disponibles:  4, total: 29 },
      { tipo: '2 ambientes',   vendidas: 21, disponibles: 12, total: 33 },
      { tipo: '3 ambientes',   vendidas:  1, disponibles:  6, total:  7 },
      { tipo: '4 ambientes',   vendidas:  0, disponibles:  1, total:  1 }
    ]

    vendidas: 17, disponibles: 32, total: 49,
    pct: 31,
    m2Vendidos: 1116, m2Disponibles: 2539,
    stock: 9546229, soldValue: 0,
    cocherasVendidas: 7, cocherasDisponibles: 18,
    minPrice: 3190, maxPrice: 4290,
    tipologias: [
      { tipo: 'Monoambiente',  vendidas:  0, disponibles:  3, total:  3 },
      { tipo: '2 ambientes',   vendidas:  0, disponibles: 12, total: 12 },
      { tipo: '3 ambientes',   vendidas:  0, disponibles:  8, total:  8 },

    tipologias: [
      { tipo: 'Monoambiente',  vendidas: 17, disponibles:  4, total: 21 },

  },
  {
    // 18 unidades "Aporte terreno" tratadas como vendidas (10 mono + 4 de 2amb + 4 de 3amb)
    name: 'SANTA FE',
    vendidas: 29, disponibles: 38, total: 67,
    pct: 33,
    m2Vendidos: 1509, m2Disponibles: 3032,
    stock: 10341878, soldValue: 1297391,
    cocherasVendidas: 10, cocherasDisponibles: 27,
    minPrice: 2268, maxPrice: 4100,
    tipologias: [
      { tipo: 'Monoambiente', vendidas: 21, disponibles:  8, total: 29 },
      { tipo: '2 ambientes',  vendidas:  4, disponibles:  8, total: 12 },

    ]
  },
  {
    name: 'DUO',
    vendidas: 25, disponibles: 39, total: 64,
    pct: 37,
    m2Vendidos: 1458, m2Disponibles: 2482,
    stock: 8347379, soldValue: 2239352,
    cocherasVendidas: 6, cocherasDisponibles: 21,
    minPrice: 2900, maxPrice: 3870,
    tipologias: [
      { tipo: 'Monoambiente', vendidas:  7, disponibles: 11, total: 18 },
      { tipo: '2 ambientes',  vendidas: 13, disponibles: 21, total: 34 },
      { tipo: '3 ambientes',  vendidas:  5, disponibles:  7, total: 12 }
    ]
  }
];

const META = {
  'NODO':     { addr: 'Dorrego 1502',       barrio: 'Palermo'           },
  'VUELTA':   { addr: 'Vta. Obligado 3952', barrio: 'Núñez'             },
  'YRIGOYEN': { addr: 'H. Yrigoyen 740',    barrio: 'Monserrat'         },
  'SANTA FE': { addr: 'Santa Fe 5065',      barrio: 'Palermo Hollywood' },
  'DUO':      { addr: 'Vilela 2347-2363',   barrio: 'Núñez'             }
};

const PROJECT_ORDER = ['NODO','VUELTA','YRIGOYEN','SANTA FE','DUO'];

const TARGETS = {
  'NODO':     { delivery:[2027,12], needsStart50: false, type:'finish'  },
  'YRIGOYEN': { delivery:[2026,12], needsStart50: false, type:'finish'  },
  'SANTA FE': { delivery:[2029,12], needsStart50: true,  type:'start50' },
  'DUO':      { delivery:[2029,12], needsStart50: true,  type:'start50' },
  'VUELTA':   { delivery:[2030,12], needsStart50: true,  type:'start50' }
};

// ── Sales objectives helpers ───────────────────────────────────────────────
function monthsUntil(year, month) {
  const now = new Date();
  return (year - now.getFullYear()) * 12 + (month - (now.getMonth() + 1));
}
function fmtRate(n, unit) {
  return n <= 0 ? '—' : (unit === 'm²' ? Math.ceil(n) + ' m²/mes' : Math.ceil(n) + ' uds/mes');
}
function urgencyClass(mLeft, pctSold) {
  if (mLeft <= 0) return 'obj-red';
  if (mLeft <= 9  && pctSold < 90) return 'obj-red';
  if (mLeft <= 18 && pctSold < 60) return 'obj-red';
  if (mLeft <= 24 && pctSold < 50) return 'obj-amber';
  return 'obj-green';
}

function buildObjectivesSection(projects) {
  const cards = projects.map(p => {
    const t = TARGETS[p.name];
    if (!t) return '';

    const hasM2   = (p.m2Vendidos||0) + (p.m2Disponibles||0) > 0;
    const unit    = hasM2 ? 'm²' : 'uds.';
    const sold    = hasM2 ? (p.m2Vendidos||0)   : (p.vendidas||0);
    const avail   = hasM2 ? (p.m2Disponibles||0) : (p.disponibles||0);
    const total   = sold + avail;
    const pctSold = total > 0 ? (sold / total * 100) : 0;

    const mLeft          = monthsUntil(t.delivery[0], t.delivery[1]);
    const monthlyFull    = mLeft > 0 ? avail / mLeft : null;
    const deliveryLabel  = `Dic ${t.delivery[0]}`;
    const urgCls         = urgencyClass(mLeft, pctSold);

    const thr50   = total * 0.5;
    const def50   = Math.max(0, thr50 - sold);
    const pct50ok = pctSold >= 50;

    const pBarW  = Math.min(100, pctSold).toFixed(1);
    const p50W   = Math.min(100, pctSold / 50 * 100).toFixed(1);
    const barClr = urgCls === 'obj-red' ? '#E24B4A' : urgCls === 'obj-amber' ? '#EF9F27' : '#639922';

    const urgBadge = mLeft <= 0
      ? `<span class="obj-badge obj-badge-red">Vencido</span>`
      : mLeft <= 12
        ? `<span class="obj-badge obj-badge-red">⚠ ${mLeft}m restantes</span>`
        : mLeft <= 24
          ? `<span class="obj-badge obj-badge-amber">${mLeft}m restantes</span>`
          : `<span class="obj-badge obj-badge-green">${mLeft}m restantes</span>`;

    const finishNote = t.type === 'finish'
      ? `<div class="obj-note obj-note-warn">Las ventas fondean la construcción — cada ${unit === 'm²' ? 'm²' : 'unidad'} vendida financia el avance de obra.</div>`
      : '';

    const start50Block = t.needsStart50 ? `
      <div class="obj-milestone ${pct50ok ? 'obj-milestone-done' : 'obj-milestone-pending'}">
        <div class="obj-milestone-head">
          <span>🏗 Inicio de obra — 50% vendido</span>
          <span class="obj-milestone-status">${pct50ok ? '✓ Alcanzado' : `Faltan ${hasM2 ? Math.ceil(def50)+' m²' : Math.ceil(def50)+' uds.'}`}</span>
        </div>
        ${!pct50ok ? `
        <div class="obj-subbar-track"><div class="obj-subbar-fill" style="width:${p50W}%;background:${barClr}"></div><div class="obj-subbar-mid"></div></div>
        <div class="obj-milestone-rates">
          <span>Ritmo para llegar en <strong>6 meses</strong>: <strong>${fmtRate(def50/6, unit)}</strong></span>
          <span>en <strong>12 meses</strong>: <strong>${fmtRate(def50/12, unit)}</strong></span>
        </div>
        <div class="obj-note obj-note-warn" style="margin-top:6px;">Cada mes de retraso en alcanzar el 50% posterga la fecha de entrega en un mes.</div>
        ` : `<div class="obj-note obj-note-ok" style="margin-top:4px;">Umbral superado — obra puede iniciar.</div>`}
      </div>` : '';

    return `
    <div class="obj-card ${urgCls}">
      <div class="obj-head">
        <div>
          <div class="obj-name">${esc(p.name)}</div>
          <div class="obj-addr">${esc(p.addr)} · ${esc(p.barrio)}</div>
        </div>
        <div style="text-align:right">
          ${urgBadge}
          <div class="obj-delivery">Entrega: ${deliveryLabel}</div>
        </div>
      </div>

      <div class="obj-progress-wrap">
        <div class="obj-progress-label"><span>${pctSold.toFixed(1)}% vendido${hasM2?' en m²':' en uds.'}</span><span>${sold > 0 ? (hasM2 ? sold.toLocaleString('es-AR')+' m²' : sold+' uds.') : '—'} de ${total > 0 ? (hasM2 ? total.toLocaleString('es-AR')+' m²' : total+' uds.') : '—'}</span></div>
        <div class="pbar-track"><div class="pbar-fill" style="width:${pBarW}%;background:${barClr}"></div></div>
      </div>

      ${start50Block}
      ${finishNote}

      <div class="obj-targets">
        <div class="obj-target-main">
          <div class="obj-target-label">Ritmo necesario para entrega puntual</div>
          <div class="obj-target-value" style="color:${barClr}">${monthlyFull !== null ? fmtRate(monthlyFull, unit) : '—'}</div>
        </div>
        <div class="obj-stats-row">
          <div class="obj-stat"><div class="obj-stat-label">Total</div><div class="obj-stat-val">${total > 0 ? (hasM2 ? total.toLocaleString('es-AR')+' m²' : total+' uds.') : '—'}</div></div>
          <div class="obj-stat"><div class="obj-stat-label">Vendido</div><div class="obj-stat-val" style="color:#3B6D11">${sold > 0 ? (hasM2 ? sold.toLocaleString('es-AR')+' m²' : sold+' uds.') : '—'}</div></div>
          <div class="obj-stat"><div class="obj-stat-label">Por vender</div><div class="obj-stat-val" style="color:#E24B4A">${avail > 0 ? (hasM2 ? avail.toLocaleString('es-AR')+' m²' : avail+' uds.') : '—'}</div></div>
          <div class="obj-stat"><div class="obj-stat-label">Meses</div><div class="obj-stat-val">${mLeft > 0 ? mLeft : 'Vencido'}</div></div>
        </div>
      </div>
    </div>`;
  }).join('');

  return `
  <div class="dash-section">
    <div class="section-title">02 · Objetivos de venta</div>
    <div class="obj-grid">${cards}</div>
  </div>`;
}

let charts = [];
function fmt(n) {
  if (n >= 1e6) return 'USD ' + (n/1e6).toFixed(1) + 'M';
  if (n >= 1000) return 'USD ' + Math.round(n/1000) + 'k';
  return 'USD ' + n;
}
function badgeClass(pct) { return pct >= 60 ? 'badge-green' : pct >= 40 ? 'badge-amber' : 'badge-red'; }
function barColor(pct)   { return pct >= 60 ? '#639922'    : pct >= 40 ? '#EF9F27'    : '#E24B4A';    }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtM2(n) {
  if (!n || n === 0) return '—';
  if (n >= 1000) return (n/1000).toFixed(1) + 'k m²';
  return n + ' m²';
}

function render(projects) {
  const totalV     = projects.reduce((s,p)=>s+p.vendidas,0);
  const totalD     = projects.reduce((s,p)=>s+p.disponibles,0);
  const totalU     = totalV + totalD;
  const totalStock = projects.reduce((s,p)=>s+p.stock,0);
  const totalSold  = projects.reduce((s,p)=>s+(p.soldValue||0),0);
  const totalM2V   = projects.reduce((s,p)=>s+(p.m2Vendidos||0),0);
  const totalM2D   = projects.reduce((s,p)=>s+(p.m2Disponibles||0),0);
  const totalM2    = totalM2V + totalM2D;
  const avgPct = totalM2 > 0 ? Math.round(totalM2V/totalM2*100)
               : totalU     ? Math.round(totalV/totalU*100) : 0;
  const pctLabel = totalM2 > 0 ? 'Absorción m² prom.' : 'Absorción prom.';

  const kpiHtml = `
  <div class="kpi-row">
    <div class="kpi-box"><div class="kpi-label">Proyectos activos</div><div class="kpi-value">5</div><div class="kpi-sub">CABA — 3 barrios</div></div>
    <div class="kpi-box"><div class="kpi-label">Unidades relevadas</div><div class="kpi-value">${totalU}</div><div class="kpi-sub">${totalV} vendidas · ${totalD} disponibles</div></div>
    <div class="kpi-box"><div class="kpi-label">${pctLabel}</div><div class="kpi-value">${avgPct}%</div><div class="kpi-sub">${totalM2>0?`${fmtM2(totalM2V)} de ${fmtM2(totalM2)} totales`:'del portafolio total'}</div></div>
    <div class="kpi-box"><div class="kpi-label">Stock disponible</div><div class="kpi-value" style="font-size:20px;">${fmt(totalStock)||'—'}</div><div class="kpi-sub">${totalM2D>0?fmtM2(totalM2D)+' disponibles':'residencial'}</div></div>
    <div class="kpi-box"><div class="kpi-label">m² disponibles total</div><div class="kpi-value" style="font-size:20px;color:#378ADD">${fmtM2(totalM2D)}</div><div class="kpi-sub">en ${totalD} unidades</div></div>
  </div>`;

  const sec1 = `
  <div class="dash-section">
    <div class="section-title">01 · Resumen general</div>
    <div class="cards-grid">
      ${projects.map(p=>{
        const hasM2 = (p.m2Vendidos||0) + (p.m2Disponibles||0) > 0;
        const badgeLabel = hasM2 ? `${p.pct}% m² vendido` : `${p.pct}% vendido`;
        return `
      <div class="pcard">
        <div class="pcard-top"><div class="pcard-name">${p.name}</div><span class="pcard-badge ${badgeClass(p.pct)}">${badgeLabel}</span></div>
        <div class="pcard-addr">${p.addr} · ${p.barrio}</div>
        <div class="pbar-track"><div class="pbar-fill" style="width:${p.pct}%;background:${barColor(p.pct)};"></div></div>
        <div class="stat-grid">
          <div class="stat-row"><span class="stat-label">m² vendidos</span><span class="stat-value" style="color:${hasM2?'#3B6D11':'#bbb'}">${hasM2?fmtM2(p.m2Vendidos):'N/D'}</span></div>
          <div class="stat-row"><span class="stat-label">m² disponibles</span><span class="stat-value" style="color:${hasM2?'#378ADD':'#bbb'}">${hasM2?fmtM2(p.m2Disponibles):'N/D'}</span></div>
          <div class="stat-row" style="grid-column:1/-1;font-size:11px;color:#bbb;padding-bottom:2px;">${hasM2?`<span style="color:#666">Total: ${fmtM2((p.m2Vendidos||0)+(p.m2Disponibles||0))}</span>`:'<span style="font-style:italic">sin col. superficie en planilla</span>'}</div>
          <div class="stat-divider"></div>
          <div class="stat-row"><span class="stat-label">Unidades vend.</span><span class="stat-value">${p.vendidas}</span></div>
          <div class="stat-row"><span class="stat-label">Unidades disp.</span><span class="stat-value">${p.disponibles}</span></div>
          ${(p.cocherasVendidas||p.cocherasDisponibles)?`
          <div class="stat-divider"></div>
          <div class="stat-row"><span class="stat-label">Cocheras vend.</span><span class="stat-value">${p.cocherasVendidas}</span></div>
          <div class="stat-row"><span class="stat-label">Cocheras disp.</span><span class="stat-value">${p.cocherasDisponibles}</span></div>`:''}
        </div>
      </div>`;}).join('')}
    </div>
  </div>`;

  const sec2 = buildObjectivesSection(projects);

  const sec3 = `
  <div class="dash-section">
    <div class="section-title">03 · Económica</div>
    <div class="econ-wrap">
      <table class="econ-table">
        <thead><tr><th>Proyecto</th><th>USD Vendido</th><th>Stock Disponible</th><th>m² Vendidos</th><th>m² Disponibles</th></tr></thead>
        <tbody>${projects.map(p=>{
          const sv  = p.soldValue>0  ? `<span class="econ-green">${fmt(p.soldValue)}</span>`      : `<span class="econ-nd">N/D</span>`;
          const stk = p.stock>0      ? `<span class="econ-blue">${fmt(p.stock)}</span>`           : `<span class="econ-nd">—</span>`;
          const m2v = p.m2Vendidos>0 ? `<span class="econ-green">${p.m2Vendidos.toLocaleString('es-AR')} m²</span>` : `<span class="econ-nd">—</span>`;
          const m2d = p.m2Disponibles>0 ? `<span class="econ-blue">${p.m2Disponibles.toLocaleString('es-AR')} m²</span>` : `<span class="econ-nd">—</span>`;
          return `<tr><td><div class="econ-name">${p.name}</div><div class="econ-barrio">${p.barrio}</div></td><td>${sv}</td><td>${stk}</td><td>${m2v}</td><td>${m2d}</td></tr>`;
        }).join('')}</tbody>
        <tfoot><tr>
          <td>TOTAL PORTAFOLIO</td>
          <td>${totalSold>0?`<span class="econ-green">${fmt(totalSold)}</span>`:`<span class="econ-nd">N/D</span>`}</td>
          <td><span class="econ-blue">${fmt(totalStock)}</span></td>
          <td><span class="econ-green">${totalM2V.toLocaleString('es-AR')} m²</span></td>
          <td><span class="econ-blue">${totalM2D.toLocaleString('es-AR')} m²</span></td>
        </tr></tfoot>
      </table>
    </div>
  </div>`;

  const tipoCards = projects.map(p=>{
    const tipos = (p.tipologias||[]).filter(t=>t.tipo!=='Sin tipología');
    const sinTipo = (p.tipologias||[]).find(t=>t.tipo==='Sin tipología');
    let tableBody = '';
    if (tipos.length>0) {
      tableBody = tipos.map(t=>`<tr><td class="t-name">${esc(t.tipo)}</td><td class="t-vend">${t.vendidas}</td><td class="t-disp">${t.disponibles}</td><td class="t-total">${t.total}</td></tr>`).join('');
      if (sinTipo && sinTipo.vendidas>0) tableBody += `<tr style="opacity:0.5"><td class="t-name" style="font-style:italic">Sin tipo registrado</td><td class="t-vend">${sinTipo.vendidas}</td><td class="t-disp">${sinTipo.disponibles}</td><td class="t-total">${sinTipo.total}</td></tr>`;
    } else if (sinTipo && sinTipo.vendidas>0) {
      tableBody = `<tr style="opacity:0.5"><td class="t-name" style="font-style:italic">Sin tipo registrado</td><td class="t-vend">${sinTipo.vendidas}</td><td class="t-disp">${sinTipo.disponibles}</td><td class="t-total">${sinTipo.total}</td></tr>`;
    } else {
      tableBody = `<tr><td colspan="4" style="color:#bbb;font-size:12px;padding:8px 0;">Sin datos de tipología</td></tr>`;
    }
    const precioRow = (p.minPrice&&p.maxPrice) ? `<div class="precio-range"><span class="precio-label">Precio m²</span><span class="precio-value">$${p.minPrice.toLocaleString()} – $${p.maxPrice.toLocaleString()}</span></div>` : '';
    return `<div class="tipo-card"><div class="tipo-card-title">${p.name}</div><div class="tipo-card-sub">${p.addr}</div><table class="tipo-table"><thead><tr><th>Tipología</th><th>Vend.</th><th>Disp.</th><th>Total</th></tr></thead><tbody>${tableBody}</tbody></table>${precioRow}</div>`;
  }).join('');

  const sec4 = `
  <div class="dash-section">
    <div class="section-title">04 · Stock y tipologías</div>
    <div class="tipo-grid">${tipoCards}</div>
  </div>`;

  const sec5 = `
  <div class="dash-section">
    <div class="section-title">05 · Gráficos de absorción</div>
    <div class="charts-row">
      <div class="chart-box"><div class="chart-title">Absorción por proyecto (% m² vendido)</div><div class="chart-wrap"><canvas id="c1"></canvas></div></div>
      <div class="chart-box"><div class="chart-title">m² disponibles por proyecto</div><div class="chart-wrap"><canvas id="c2"></canvas></div></div>
    </div>
    <div class="chart-box"><div class="chart-title">Vendidas vs. disponibles por proyecto (unidades)</div><div class="chart-wrap-wide"><canvas id="c3"></canvas></div></div>
  </div>`;

  const yrig = projects.find(p=>p.name==='YRIGOYEN');
  const duo  = projects.find(p=>p.name==='DUO');
  const notesHtml = `
  <div class="notes-box">
    <div class="note-item note-info">ℹ USD vendido es parcial — los valores de cierre post-negociación se cargan progresivamente en las planillas. Las cifras son un mínimo, no el total real.</div>
    <div class="note-item note-info">ℹ SANTA FE: 18 unidades "Aporte terreno" contabilizadas como vendidas (10 mono + 4 de 2 amb + 4 de 3 amb · 1.052 m²), elevando la absorción de 13% → 33%.</div>
    ${yrig&&yrig.disponibles<=5?`<div class="note-item note-warn">⚠ YRIGOYEN casi agotado — ${yrig.disponibles} unidades disponibles en Monserrat.</div>`:''}
    ${duo&&duo.pct<40?`<div class="note-item note-warn">⚠ DUO (Vilela) tiene baja absorción (${duo.pct}% en m²). Evaluar estrategia comercial diferenciada.</div>`:''}
    <div class="note-item note-info">📅 Dashboard generado el 18/05/2026 con datos estáticos. Para actualizar, regenerar desde Cowork.</div>
  </div>`;

  document.getElementById('content').innerHTML = kpiHtml + sec1 + sec2 + sec3 + sec4 + sec5 + notesHtml;

  const names  = projects.map(p=>p.name);
  const bColors= projects.map(p=>barColor(p.pct));
  const gridC  = 'rgba(0,0,0,0.05)';
  const tf     = { size: 11 };

  charts.forEach(c=>c.destroy()); charts = [];

  charts.push(new Chart(document.getElementById('c1'),{
    type:'bar',
    data:{labels:names,datasets:[{data:projects.map(p=>p.pct),backgroundColor:bColors,borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' '+ctx.parsed.y+'%'}}},scales:{x:{grid:{display:false},ticks:{font:tf}},y:{max:100,grid:{color:gridC},ticks:{callback:v=>v+'%',font:tf}}}}
  }));

  charts.push(new Chart(document.getElementById('c2'),{
    type:'bar',
    data:{labels:names,datasets:[{data:projects.map(p=>p.m2Disponibles||0),backgroundColor:'#378ADD',borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' '+ctx.parsed.y.toLocaleString('es-AR')+' m²'}}},scales:{x:{grid:{display:false},ticks:{font:tf}},y:{grid:{color:gridC},ticks:{callback:v=>v>=1000?(v/1000).toFixed(1)+'k':v,font:tf}}}}
  }));

  charts.push(new Chart(document.getElementById('c3'),{
    type:'bar',
    data:{labels:names,datasets:[
      {label:'Vendidas',data:projects.map(p=>p.vendidas),backgroundColor:'#639922',borderRadius:3},
      {label:'Disponibles',data:projects.map(p=>p.disponibles),backgroundColor:'#378ADD',borderRadius:3}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:tf,boxWidth:12,boxHeight:12}}},scales:{x:{grid:{display:false},ticks:{font:tf}},y:{grid:{color:gridC},ticks:{font:tf}}}}
  }));
}

// ── Initialize with static data ────────────────────────────────────────────
function init() {
  const projects = PROJECT_ORDER.map(name => {
    const d = STATIC_DATA.find(x => x.name === name) || {
      vendidas:0, disponibles:0, total:0, pct:0,
      m2Vendidos:0, m2Disponibles:0,
      stock:0, soldValue:0,
      cocherasVendidas:0, cocherasDisponibles:0,
      minPrice:0, maxPrice:0, tipologias:[]
    };
    return { ...d, ...META[name] };
  });
  render(projects);
}

init();
</script>
</body>
</html>
